services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pokerledger
      POSTGRES_PASSWORD: pokerledger
      POSTGRES_DB: pokerledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokerledger -d pokerledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://pokerledger:pokerledger@db:5432/pokerledger
      SECRET_KEY: change-me-in-production
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
