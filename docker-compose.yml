# PokerStraton on a VPS (Beget etc.): UI + API + Postgres, one domain.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: pokerstarton
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker -d pokerstarton"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://poker:${POSTGRES_PASSWORD:-changeme}@db:5432/pokerstarton
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://pokerstarton.ru,http://localhost:5173}
      DESKTOP_STATIC_DIR: /app/static
      UPLOAD_DIR: /app/uploads
      PORT: "8000"
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"

volumes:
  pgdata:
  uploads:
