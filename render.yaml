# Blueprint for PokerStarton on Render.
# Static Site SPA: catch-all rewrite so /nickname, /strategies, etc. serve index.html.
services:
  - type: web
    name: pokerstarton-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.11"
      - key: DATABASE_URL
        fromDatabase:
          name: pokerstarton_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads

  - type: web
    name: pokerstarton
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false

databases:
  - name: pokerstarton_db
    plan: free
