# PokerStarton on Render — API serves UI (same origin, no CORS).
services:
  - type: web
    name: pokerstarton-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pokerstarton_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://pokerstarton-api.onrender.com,https://pokerstarton.onrender.com,http://localhost:5173"
      - key: DESKTOP_STATIC_DIR
        value: /app/static
      - key: UPLOAD_DIR
        value: /tmp/uploads

databases:
  - name: pokerstarton_db
    plan: free
